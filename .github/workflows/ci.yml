name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy types-requests
          pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check threat_lens/ api.py

      - name: Ruff format check
        run: ruff format --check threat_lens/ api.py

      - name: Mypy type check
        run: mypy threat_lens/ api.py --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx

      - name: Run tests
        run: pytest tests/ -v --cov=threat_lens --cov-report=term-missing

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t threat-lens:ci .

      - name: Smoke test
        run: |
          docker run -d --name tl -p 8000:8000 threat-lens:ci
          sleep 5
          curl -sf http://localhost:8000/healthz | grep ok
          docker stop tl
